name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  swift-pm:
    name: Swift PM
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Swift toolchain
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Swift version
        run: swift --version

      - name: Run tests
        run: swift test
